name: DragonReign
version: 1.2.0
main: com.smp.dragonreign.DragonReign
api-version: '1.21'
author: ThConMan
description: Enforces a server's special Dragon Egg rules for an SMP.
website: https://github.com/ThConMan/DragonReign
softdepend: [PlaceholderAPI, LuckPerms, CMI, Essentials]

commands:
  dragonreign:
    description: DragonReign admin and info commands.
    usage: /dr <gui|log|inbox|respawn [force]|cancel|reload|victor|cosmetics|particle|title|info>
    aliases: [dr, dreign, degg]
  giveegg:
    description: Hand the Dragon Egg you are holding to another online player.
    usage: /giveegg <player>
    # Permission (dragonreign.giveegg) is enforced in code so a denial is silent.

permissions:
  dragonreign.bypass:
    description: Ignores all Dragon Egg protections (containers, drops, bundles, sweeps).
    default: op
  dragonreign.giveegg:
    description: Allows use of /giveegg.
    default: true
  dragonreign.command.info:
    description: View /dr info (the public egg readout).
    default: true
  dragonreign.command.gui:
    description: Open the config GUI.
    default: op
  dragonreign.command.history:
    description: Open the history GUI (/dr log).
    default: op
  dragonreign.command.inbox:
    description: Open the staff inbox GUI.
    default: op
  dragonreign.command.respawn:
    description: Trigger or force an egg respawn.
    default: op
  dragonreign.command.cancel:
    description: Cancel an active respawn countdown.
    default: op
  dragonreign.command.reload:
    description: Reload the configuration.
    default: op
  dragonreign.gui.teleport:
    description: Use the teleport-to-egg button in the config GUI.
    default: op
  dragonreign.command.victor:
    description: Grant or revoke Dragonlord status.
    default: op
  dragonreign.command.cosmetics:
    description: Use the player cosmetic toggles (/dr cosmetics, particle, title).
    default: true
  dragonreign.victor:
    description: Marks a player as a Dragonlord. Granted automatically at the hold-time threshold.
    default: false
  dragonreign.admin:
    description: Grants every DragonReign admin permission (the command.* and gui.* nodes).
    default: op
    children:
      dragonreign.command.info: true
      dragonreign.command.gui: true
      dragonreign.command.history: true
      dragonreign.command.inbox: true
      dragonreign.command.respawn: true
      dragonreign.command.cancel: true
      dragonreign.command.reload: true
      dragonreign.command.victor: true
      dragonreign.gui.teleport: true
