# ═══════════════════════════════════════════════════════════════════════════
#  DragonReign  —  the one Dragon Egg, kept honest.
#
#  Every rule below can also be flipped live from the in-game config GUI
#  (/dragonreign gui). Editing this file by hand and running /dragonreign reload
#  works too. The protections apply to ALL dragon egg items, not a single tagged
#  one, so the rules can't be dodged by making a copycat egg.
# ═══════════════════════════════════════════════════════════════════════════

# ── Protection rules (toggle these live) ───────────────────────────────────

# Block the egg from entering ANY non-player inventory: chests, barrels, shulkers,
# droppers, dispensers, furnaces, the ender chest, AND bundles of any color.
# The egg may only sit in a player's inventory or be placed as a block.
no-containers: true        # default: true

# Cancel dropping the dragon egg (Q / drop key, AND drops from inside an open menu).
no-drop: true              # default: true

enderchest-sweep:
  enabled: true            # default: true
  interval-minutes: 5      # default: 5. safety-net scan of online players' ender chests

# ── Egg compass ────────────────────────────────────────────────────────────
# Players standing near the placed egg see an action-bar arrow pointing toward it,
# so a hidden egg can always be tracked down. Far edge of the range shows only a
# faint "something's near"; closer shows a direction; right on top shows "right here".
compass:
  enabled: true            # default: true
  radius: 16               # default: 16. only players within this many blocks see the arrow
  update-ticks: 10         # default: 10 (about twice a second). how often the arrow refreshes
  show-to-owner: false     # default: false. also show the arrow to the egg's owner

respawn-on-inactivity:
  enabled: true            # default: true
  inactivity-days: 14      # default: 14. owner gone this long -> the egg respawns in the End
  check-interval-minutes: 5   # default: 5. how often inactivity is checked
  # Bring the egg back if it sits untouched (not placed, broken, picked up, or handed over)
  # for this many days -- even if the owner is online. Stops someone from parking the egg
  # forever. Set to 0 to turn this off. Must be less than inactivity-days.
  staleness-days: 10       # default: 10. 0 = off

# ── Respawn countdown ──────────────────────────────────────────────────────
# When the inactivity check decides the egg should come back, it does NOT respawn
# instantly. Instead a single countdown starts so players can rush to the End and
# fight over the egg. If the absent keeper logs back in during the countdown it is
# (optionally) cancelled and the egg stays put.
respawn-countdown:
  enabled: true                        # default: true. false = respawn instantly (old behaviour)
  duration-seconds: 300                # default: 300. length of the contest window
  # Seconds-remaining marks at which to broadcast a warning (chat + title + sound).
  warn-at-seconds: [300, 60, 30, 10, 5, 4, 3, 2, 1]   # default shown
  abort-on-owner-return: true          # default: true. keeper logging in cancels the countdown
  tick-sound: "minecraft:block.note_block.pling"      # default shown; played at each warn mark

# ── Strict ownership + IP / alt detection (OPTIONAL, OFF by default) ────────
# PRIVACY: this NEVER saves real IP addresses. When a player joins it saves only a
# scrambled, one-way code made from the address, used only to ask "have two accounts
# joined from the same place?". The secret used to scramble it is made automatically
# on first run.
#
# This is not perfect — people who share one internet connection (same house, school,
# phone network, or VPN) can look "linked" even when they're strangers. For that reason
# the default is to FLAG (post a staff-inbox alert), NOT to enforce. Turn on
# auto-enforce-ip-links only if you understand and accept those false matches.
strict-ownership:
  enabled: false                       # default: false. master switch for transfer checks
  min-receiver-active-days: 7          # default: 7. receiver idle longer than this -> flagged
  check-ip-alts: true                  # default: true. also use IP-link checks + group last-seen
  auto-enforce-ip-links: false         # default: false. true = an alt hand-off won't reset the timer
  # If more than this many accounts share one connection code, it's treated as a shared or
  # public connection (like a phone network or VPN) and IGNORED for alt-grouping — so an
  # inactive keeper can't log in once through a busy public connection to borrow strangers'
  # recent logins and keep the egg forever. 0 = no cap.
  max-ip-group: 8                      # default: 8
  ip-hash-salt: ""                     # AUTO-GENERATED on first run. Do NOT change or share it;
                                       # changing it makes every saved code stop matching.

# ── Staff inbox ────────────────────────────────────────────────────────────
# A saved alert queue for admins: alt/IP flags, dupe cleanups, respawns, etc.
# Alerts DM any online admin immediately and are always queued for /dragonreign inbox.
inbox:
  enabled: true                        # default: true
  notify-on-join: true                 # default: true. tell admins their unread count on join
  max-entries: 200                     # default: 200. oldest alerts evicted past this

# ── Announcement (fires when the egg respawns) ─────────────────────────────
announce:
  enabled: true            # default: true
  # Chat broadcast lines (MiniMessage formatting).
  chat:                    # default: the lines below (MiniMessage — gradients, <bold>, etc.)
    - "<dark_purple><strikethrough>                                                  </strikethrough></dark_purple>"
    - "<bold><gradient:#9D4EDD:#D9B3FF:#F7F3E9>✦  THE DRAGON EGG RETURNS  ✦</gradient></bold>"
    - "<gray>Its last keeper vanished into the void. <white><bold>Claim it</bold></white> <gray>if you dare.</gray>"
    - "<dark_purple><strikethrough>                                                  </strikethrough></dark_purple>"
  # Big screen title shown to everyone.
  title:
    title: "<bold><gradient:#7A1FA2:#B388FF:#F7F3E9>✦ The Egg Reigns Again ✦</gradient></bold>"   # default shown
    subtitle: "<italic><gradient:#D9B3FF:#9D4EDD>A new keeper is needed</gradient></italic>"        # default shown
    fade-in-ticks: 10      # default: 10
    stay-ticks: 70         # default: 70
    fade-out-ticks: 20     # default: 20
  # LIGHTNING | DRAGON_DEATH | BOTH | NONE | CUSTOM
  sound:
    mode: BOTH             # default: BOTH
    custom-key: "minecraft:entity.ender_dragon.growl"   # default shown; only used when mode is CUSTOM

# ── Hold rewards ───────────────────────────────────────────────────────────
# The current owner earns a reward for every stretch of time they actively hold the
# egg. Each "tier" below is a list of console commands run for that reward, with
# %player% (and %tier%) filled in -- so you can give items, money, xp, or effects.
# After the first reward the owner moves up to the next tier; past the last tier the
# top tier keeps paying out. The ladder resets to the start when the egg changes hands
# (unless reset-on-loss is false). Only the owner is told when they earn -- no broadcasts.
rewards:
  enabled: true            # default: true
  interval-minutes: 60     # default: 60. active holding time needed for each reward
  reset-on-loss: true      # default: true. losing the egg resets the owner back to tier 1
  tiers:                   # each line is one reward = a list of console commands
    - ["give %player% diamond 4"]
    - ["give %player% diamond 8", "xp add %player% 30 levels"]
    - ["effect give %player% strength 600 1"]

# ── Away (AFK) check ───────────────────────────────────────────────────────
# Reward time and Dragonlord time only build up while the owner is really playing.
# The owner counts as away if CMI or EssentialsX (when installed) says so, OR if they
# haven't actually travelled for idle-seconds. The built-in travel check always runs too,
# so a stationary auto-clicker is still caught even when another plugin reports "active".
# Small repeated motion (an AFK pool, a tiny loop, a one-block nudge) does not count.
afk:
  enabled: true            # default: true
  idle-seconds: 300        # default: 300. no real travel for this long counts as away

# ── Void safety ────────────────────────────────────────────────────────────
# The one egg can never be lost for good. If a dropped egg or a falling egg block ever
# slips into the void, it's rebuilt on the End fountain and staff get an alert.
void-safety:
  enabled: true            # default: true
  check-ticks: 20          # default: 20 (about once a second). how often the loose egg is checked.
                           # capped at 20: a wider gap could let a falling egg cross into the void unseen

# ── Dragonlord (victor) cosmetics ──────────────────────────────────────────
# Holding the egg builds up lifetime active hold-time (away time doesn't count, and it
# never resets). Once a player passes threshold-hours they permanently become a
# "Dragonlord" and unlock cosmetics: a sparkle aura and a chat/tab title. Players can
# turn their own cosmetics on or off; admins can grant or revoke Dragonlord status.
victor:
  threshold-hours: 168     # default: 168 (7 days of active holding) to become a Dragonlord
  title: "&x&9&D&4&E&D&D&lD&x&A&7&6&0&D&E&lr&x&B&1&7&3&E&0&la&x&B&B&8&5&E&1&lg&x&C&5&9&7&E&2&lo&x&C&F&A&A&E&4&ln&x&D&9&B&C&E&5&ll&x&E&3&C&E&E&6&lo&x&E&D&E&1&E&8&lr&x&F&7&F&3&E&9&ld"    # ender-purple -> off-white bold gradient (pre-rendered hex so TAB/CMI/chat all display it)
  title-enabled: true      # default: true. master switch for the title
  particle-enabled: true   # default: true. master switch for the aura
  particle: PORTAL         # default shown. particle type for the aura (PORTAL = purple enderman-style swirl)
  particle-density: 12     # default: 12. how many particles per puff
  particle-interval-ticks: 40   # default: 40 (every 2 seconds). how often the aura shows
  # Optional: also write the title as a LuckPerms meta value ("dragonreign-title") so
  # LuckPerms-based prefixes can use it. Off by default so it won't touch existing prefixes.
  luckperms-meta: false    # default: false

# ── Chat title ─────────────────────────────────────────────────────────────
# Some chat handlers (e.g. CMI's display name) don't expand the %dragonreign_title%
# placeholder. Turn this on and DragonReign adds the Dragonlord title to a victor's chat
# line itself. Only victors with their title on are affected — everyone else's chat is
# left exactly as your chat plugin formats it. {title} = the title, {name} = the player's
# name; %...% are PlaceholderAPI placeholders (e.g. the LuckPerms prefix).
chat:
  enabled: false           # default: false. turn on if your chat plugin doesn't show the title
  format: "%luckperms_prefix%{title} {name}%luckperms_suffix%&8: &f"

# ── Bookkeeping ────────────────────────────────────────────────────────────
history:
  max-entries: 1000        # default: 1000

# ── Messages ───────────────────────────────────────────────────────────────
# All MiniMessage. The prefix is prepended to most plugin messages. Blocked-action
# messages always explain WHY the action was stopped.
messages:
  prefix: "<bold><gradient:#7A1FA2:#B388FF>[DragonReign]</gradient></bold> "
  blocked-container: "<red>The Dragon Egg can't go in there.</red>"
  blocked-bundle: "<red>The Dragon Egg can't go in a bundle.</red>"
  blocked-drop: "<red>You can't drop the Dragon Egg.</red>"
  # Countdown messages. <seconds> is replaced with the number of seconds remaining.
  countdown-started: "<gradient:#FF6A00:#FFD700><bold>The Egg's keeper has vanished!</bold></gradient> <gray>It returns to The End in <white><bold><seconds>s</bold></white> <gray>unless they return.</gray>"
  countdown-warn: "<gradient:#FFD700:#FF4E50><bold>The Dragon Egg respawns in <seconds>s!</bold></gradient> <gray>Race to The End!</gray>"
  # On-screen title + subtitle shown at each countdown warn mark. <seconds> is substituted.
  countdown-title: "<bold><gradient:#FF4E50:#FF6A00:#FFD700>❰ EGG RESPAWN ❱</gradient></bold>"
  countdown-subtitle: "<bold><gradient:#FFD700:#FFFFFF><seconds></gradient></bold> <gray>until it returns to The End</gray>"
  # <player> is replaced with the returning keeper's name.
  keeper-returned: "<gradient:#00C853:#B9F6CA><bold>✦ <player> returned in time</bold></gradient> <gray>— the Dragon Egg stays put.</gray>"
  # Sent only to the owner when they earn a hold reward. <tier> is the reward number.
  reward-earned: "<gradient:#FFD700:#FFF8E1><bold>✦ Hold Reward</bold></gradient> <gray>— you held the Dragon Egg long enough. <white>Reward <tier></white> <gray>granted.</gray>"
  # Sent only to the player when they become a Dragonlord.
  victor-earned: "<bold><gradient:#9D4EDD:#F7F3E9>✦ You are now a DRAGONLORD ✦</gradient></bold> <gray>Your prestige cosmetics are unlocked.</gray>"

# If false, BLOCKED_* events are not written to the history log (players are still
# nudged). Keeps the log readable on servers with very persistent hoppers.
log-blocks-to-history: true   # default: true

# ── Advanced ───────────────────────────────────────────────────────────────
# Blank = auto-detect the first THE_END world. Set a name to force a specific one.
end-world-name: ""

# How often active hold-time is sampled for rewards and Dragonlord progress. This is
# only the measuring rate, not the reward timing -- leave it unless you know you need to.
hold-time:
  accrual-ticks: 100       # default: 100 (every 5 seconds)
  # When on, reward and Dragonlord time only build up while the owner is actually with the
  # egg -- carrying it, or standing within presence-radius of the placed egg block. This
  # stops someone from walling the egg into a base and farming time while they're elsewhere.
  require-presence: true   # default: true
  presence-radius: 16      # default: 16. blocks from the placed egg that count as "with it"
